# Deploys packages/admin (the Next.js admin dashboard) — the only Netlify-appropriate
# app in this npm-workspaces monorepo. packages/api is a NestJS server and
# packages/mobile is React Native; neither is a Netlify static/SSR target.
#
# `base` is pinned to the repo root explicitly — this overrides a stray "Base
# directory: packages/mobile" left over in the Netlify site's dashboard settings
# from initial repo connection, which otherwise wins by default whenever this file
# doesn't set `base` itself and doubles every path below.
[build]
  base = "."
  # @markaba/shared must be built first — its package.json points `main` at
  # dist/index.js, which doesn't exist until built. dist/ is gitignored, so a
  # fresh checkout has nothing there until this runs.
  command = "npm install && npm run build --workspace=@markaba/shared && npm run build --workspace=@markaba/admin"
  publish = "packages/admin/.next"

[build.environment]
  NODE_VERSION = "20"

# This site has a fully custom base/command/publish (required for the npm
# workspaces monorepo layout above), so Netlify does NOT auto-attach the
# Next.js runtime on its own — without this block, `.next` output is published
# with no Functions/redirects wired up at all, so every route 404s (confirmed:
# removing this entirely broke the site, not just Server Actions).
#
# The version is controlled via the root package.json devDependency instead of
# a `version` field here (netlify.toml plugin blocks don't support pinning
# directly) — Netlify Build prefers a plugin already present in node_modules
# over its own bundled default. Previously this resolved to a stale v4.41.6
# (Netlify's own build log flagged it — latest is v5.15.12), which likely
# explains "Sign in" failing in production: the login form's Server Action
# (`cookies().set()` + `redirect()` inside `'use server'`) needs the App
# Router Server Actions support that improved significantly since v4.
[[plugins]]
  package = "@netlify/plugin-nextjs"
